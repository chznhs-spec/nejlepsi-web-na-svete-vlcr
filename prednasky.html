<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyhledávač přednášek | VLČR</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .tag-room { background: #f1f5f9 !important; color: #475569 !important; border: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body class="lectures-page">

    <section class="menu">
        <a href="index.html" class="horizontal-flex">
            <img src="logo_VLCR.png" alt="Logo VLČR" class="logo" />
            <p class="logo-placeholder">Vzdělaný lid České republiky</p>
        </a>
        <section class="menu-text">
            <a href="projekt.html" class="menu-item">Projekty</a>
            <a href="novinki.html" class="menu-item">Novinky</a>
            <a href="nastym.html" class="menu-item">Náš tým</a>
            <a href="kontakt.html" class="menu-item">Kontakt</a>
        </section>
    </section>

    <main class="content">
        <div class="search-header-v2">
            <h1 class="search-title">Vyhledávač přednášek</h1>
        </div>

        <section class="filter-section">
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Hledat název, jméno nebo téma..." />
                
                <select id="categoryFilter">
                    <option value="all">Všechny obory</option>
                    <option value="Chemie">Chemie</option>
                    <option value="Fyzika">Fyzika</option>
                    <option value="Technologie">Technologie</option>
                    <option value="Kosmonautika">Kosmonautika</option>
                    <option value="Energetika">Energetika</option>
                    <option value="Biologie">Biologie</option>
                    <option value="Matematika">Matematika</option>
                    <option value="Ekonomika">Ekonomika</option>
                    <option value="Informatika">Informatika</option>
                    <option value="Medicína">Medicína</option>
                    <option value="Historie">Historie</option>
                    <option value="Psychologie">Psychologie</option>
                </select>

                <select id="locationFilter">
                    <option value="all">Kdekoliv</option>
                    <option value="čvut">ČVUT (Praha)</option>
                    <option value="všcht">VŠCHT (Praha)</option>
                    <option value="uk">UK (Praha)</option>
                    <option value="vut">VUT (Brno)</option>
                    <option value="muni">MUNI (Brno)</option>
                    <option value="zču">ZČU (Plzeň)</option>
                    <option value="upol">UP (Olomouc)</option>
                    <option value="ntk">NTK</option>
                    <option value="online">Online</option>
                </select>
            </div>
        </section>

        <div id="lectures-list" class="lectures-grid">
            <p style="text-align:center; color: #64748b;">Načítám přednášky z VLČR kalendáře...</p>
        </div>
    </main>

<script>
    const API_KEY = 'AIzaSyBYNhB9SMazhbLZ4AQG1OZQa7DxCKABmW0'; 
    const CALENDAR_ID = 'vlcr.hlavni@gmail.com';

    let allEvents = [];

    // ROZŠÍŘENÉ OBORY (Aktualizováno o ekonomiku)
const knownCategories = [
    'chemie', 'fyzika', 'technologie', 'biologie', 'matematika', 
    'informatika', 'medicína', 'historie', 'věda', 'kosmonautika', 
    'energetika', 'astronomie', 'psychologie', 'filozofie', 'ekonomika', 'ekonomie'
];

    // ROZŠÍŘENÉ LOKALITY
    const knownLocations = { 
        '#čvut': 'ČVUT', '#uk': 'UK', '#všcht': 'VŠCHT', 
        '#ntk': 'NTK', '#online': 'Online', '#vut': 'VUT Brno',
        '#muni': 'MUNI Brno', '#zču': 'ZČU Plzeň', '#upol': 'UP Olomouc'
    };

    async function fetchLectures() {
        // Zobrazujeme jen budoucí (max 2h staré)
        const offset = new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString();
        const url = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&timeMin=${offset}&singleEvents=true&orderBy=startTime`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            allEvents = data.items || [];
            renderLectures(allEvents);
        } catch (error) {
            console.error('Chyba:', error);
            document.getElementById('lectures-list').innerHTML = `<p style="text-align:center; color: #ef4444;">Chyba při načítání.</p>`;
        }
    }

   function renderLectures(events) {
    const listElement = document.getElementById('lectures-list');
    listElement.innerHTML = '';

    if (events.length === 0) {
        listElement.innerHTML = '<p class="no-results">Žádné nadcházející přednášky nenalezeny.</p>';
        return;
    }

    events.forEach(event => {
        const start = new Date(event.start.dateTime || event.start.date);
        const day = start.getDate();
        const month = start.toLocaleString('cs-CZ', { month: 'short' }).toUpperCase().replace('.', '');
        const time = start.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });

        const fullDesc = event.description || '';
        const lowerDesc = fullDesc.toLowerCase();
        
        // 1. EXTRAKCE TAGŮ (Obory včetně ekonomiky)
        const extractedTags = fullDesc.match(/#\S+/g) || [];
        let lectureCategories = extractedTags
            .map(tag => tag.replace('#', ''))
            .filter(tag => knownCategories.includes(tag.toLowerCase()));

        if (lectureCategories.length === 0) lectureCategories = ['Přednáška'];
        const categoriesHtml = lectureCategories
            .map(cat => `<span class="tag tag-cat">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span>`)
            .join(' ');

        // 2. EXTRAKCE MÍSTNOSTI ($)
        const roomMatch = fullDesc.match(/\$(\S+)/);
        const roomHtml = roomMatch ? `<span class="tag tag-room">${roomMatch[1]}</span>` : '';

        // 3. DETERMINACE LOKALITY
        let displayLocation = event.location;
        if (!displayLocation) {
            for (const [key, value] of Object.entries(knownLocations)) {
                if (lowerDesc.includes(key)) { displayLocation = value; break; }
            }
            if (!displayLocation) displayLocation = 'Místo upřesníme';
        }

        // 4. SANITACE TEXTU (Odstranění HTML formátování a systémových znaků)
        const cleanDesc = fullDesc
            .replace(/<[^>]*>?/gm, '') // Odstraní HTML tagy z Google Kalendáře
            .replace(/#\S+/g, '')     // Odstraní hashtagy
            .replace(/\$\S+/g, '')     // Odstraní označení místností
            .trim();

        listElement.innerHTML += `
            <div class="lecture-card-v2">
                <div class="date-badge">
                    <span class="day">${day}</span>
                    <span class="month">${month}</span>
                    <span class="time">${time}</span>
                </div>
                <div class="lecture-content">
                    <div class="top-meta" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
                        ${categoriesHtml}
                        <span class="tag tag-loc">${displayLocation}</span>
                        ${roomHtml}
                    </div>
                    <h2 class="title">${event.summary}</h2>
                    <p class="description">${cleanDesc || 'Podrobnosti v popisu nebyly uvedeny.'}</p>
                </div>
            </div>
        `;
    });
}

    // Filtry (zůstávají stejné)
    function filterData() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value.toLowerCase();
        const location = document.getElementById('locationFilter').value.toLowerCase();

        const filtered = allEvents.filter(event => {
            const title = (event.summary || '').toLowerCase();
            const desc = (event.description || '').toLowerCase();
            const loc = (event.location || '').toLowerCase();
            const matchesSearch = title.includes(searchText) || desc.includes(searchText);
            const matchesCat = category === 'all' || desc.includes('#' + category);
            const matchesLoc = location === 'all' || loc.includes(location) || desc.includes('#' + location);
            return matchesSearch && matchesCat && matchesLoc;
        });
        renderLectures(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('categoryFilter').addEventListener('change', filterData);
    document.getElementById('locationFilter').addEventListener('change', filterData);
    fetchLectures();
</script>
</body>
</html>
