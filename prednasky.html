<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyhledávač přednášek | VLČR</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <section class="menu">
        <a href="index.html" class="horizontal-flex">
            <img src="logo_VLCR.png" alt="Logo VLČR" class="logo" />
            <p class="logo-placeholder">Vzdělaný lid České republiky</p>
        </a>
        <section class="menu-text">
            <a href="projekt.html" class="menu-item">Projekty</a>
            <a href="novinki.html" class="menu-item">Novinky</a>
            <a href="nastym.html" class="menu-item">Náš tým</a>
            <a href="kontakt.html" class="menu-item">Kontakt</a>
        </section>
    </section>

    <main class="content">
        <div class="search-header-v2">
            <h1 class="search-title">Vyhledávač přednášek</h1>
        </div>

        <section class="filter-section">
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Hledat název, jméno nebo téma..." />
                <select id="categoryFilter">
                    <option value="all">Všechny obory</option>
                    <option value="Věda">Věda</option>
                    <option value="Historie">Historie</option>
                    <option value="Technologie">Technologie</option>
                </select>
                <select id="locationFilter">
                    <option value="all">Kdekoliv</option>
                    <option value="Praha">Praha</option>
                    <option value="Brno">Brno</option>
                    <option value="Online">Online</option>
                </select>
            </div>
        </section>

        <div id="lectures-list" class="lectures-grid">
            <p style="text-align:center; color: #64748b;">Načítám přednášky z VLČR kalendáře...</p>
        </div>
    </main>

    <script>
        // TVOJE KONFIGURACE
        const API_KEY = 'AIzaSyBYNhB9SMazhbLZ4AQG1OZQa7DxCKABmW0'; 
        const CALENDAR_ID = 'vlcr.hlavni@gmail.com';

        let allEvents = []; // Sem si uložíme data pro filtrování

        async function fetchLectures() {
            // Načítáme události od dnešního dne dál
            const now = new Date().toISOString();
            const url = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&timeMin=${now}&singleEvents=true&orderBy=startTime`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                allEvents = data.items || [];
                renderLectures(allEvents);
            } catch (error) {
                console.error('Chyba při načítání:', error);
                document.getElementById('lectures-list').innerHTML = `
                    <p style="text-align:center; color: #ef4444; padding: 20px;">
                        <b>Chyba při propojení s kalendářem.</b><br>
                        Zkontrolujte, zda je kalendář nastaven jako "Veřejný" v nastavení Google Kalendáře.
                    </p>`;
            }
        }

        function renderLectures(events) {
            const listElement = document.getElementById('lectures-list');
            listElement.innerHTML = '';

            if (events.length === 0) {
                listElement.innerHTML = '<p class="no-results">Momentálně nejsou naplánovány žádné přednášky.</p>';
                return;
            }

            events.forEach(event => {
                const start = new Date(event.start.dateTime || event.start.date);
                const day = start.getDate();
                const month = start.toLocaleString('cs-CZ', { month: 'short' }).toUpperCase().replace('.', '');
                const time = start.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });

                // Jednoduché parsování popisu pro tagy (pokud v popisu použiješ #Věda)
                const desc = event.description || '';
                const categoryMatch = desc.match(/#(\w+)/);
                const category = categoryMatch ? categoryMatch[1] : 'Přednáška';
                const cleanDesc = desc.replace(/#\w+/g, '').trim();

                listElement.innerHTML += `
                    <div class="lecture-card-v2">
                        <div class="date-badge">
                            <span class="day">${day}</span>
                            <span class="month">${month}</span>
                            <span class="time">${time}</span>
                        </div>
                        <div class="lecture-content">
                            <div class="top-meta">
                                <span class="tag tag-cat">${category}</span>
                                <span class="tag tag-loc">${event.location || 'Místo konání upřesníme'}</span>
                            </div>
                            <h2 class="title">${event.summary}</h2>
                            <p class="description">${cleanDesc || 'K této přednášce zatím nemáme podrobnější popis.'}</p>
                        </div>
                    </div>
                `;
            });
        }

        // Logika filtrování
        function filterData() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const location = document.getElementById('locationFilter').value;

            const filtered = allEvents.filter(event => {
                const title = (event.summary || '').toLowerCase();
                const desc = (event.description || '').toLowerCase();
                const loc = (event.location || '').toLowerCase();
                
                const matchesSearch = title.includes(searchText) || desc.includes(searchText);
                const matchesCat = category === 'all' || desc.includes('#' + category);
                const matchesLoc = location === 'all' || loc.includes(location.toLowerCase());

                return matchesSearch && matchesCat && matchesLoc;
            });

            renderLectures(filtered);
        }

        // Aktivace filtrů
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('categoryFilter').addEventListener('change', filterData);
        document.getElementById('locationFilter').addEventListener('change', filterData);

        // Spuštění
        fetchLectures();
    </script>
</body>
</html>
